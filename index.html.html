<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cousins Space League: Mobile Edition</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            height: 100dvh; /* Fixes mobile browser toolbar shifting */
            background: #02000a;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-family: 'Arial Black', sans-serif;
            user-select: none;
            -webkit-user-select: none; /* Fixes iOS selection highlight */
            touch-action: manipulation; /* CRITICAL: Stops mobile double-tap zoom */
            padding: 20px 0;
            box-sizing: border-box;
            transition: background 0.5s ease, filter 0.05s ease;
        }

        /* --- CHARACTER SELECT SCREEN --- */
        #select-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 3, 38, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #select-screen h2 {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00ffcc;
            text-align: center;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 85%;
            max-width: 450px;
        }
        .player-btn {
            padding: 18px 10px;
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-family: 'Arial Black', sans-serif;
            border: 3px solid white;
            border-radius: 15px;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
            touch-action: manipulation;
        }
        .player-btn:active { transform: scale(0.95); }

        /* --- LOCHLYN CHEERLEADER --- */
        #lochlyn-container {
            position: absolute;
            bottom: 4%;
            left: 4%;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 15;
            pointer-events: none;
        }
        #lochlyn-avatar {
            font-size: clamp(50px, 12vw, 65px);
        }
        #lochlyn-bubble {
            background: white;
            color: black;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: clamp(0.75rem, 2.5vw, 0.9rem);
            margin-bottom: 8px;
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            position: relative;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            white-space: nowrap;
        }
        #lochlyn-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: white transparent;
        }
        .jump {
            animation: miniJump 0.12s ease-out;
        }
        @keyframes miniJump {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }

        /* --- THE MOON --- */
        #moon {
            position: absolute;
            top: 12%;
            font-size: clamp(70px, 18vw, 95px);
            z-index: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
            animation: moonGlow 3s infinite alternate ease-in-out;
            display: none;
        }
        @keyframes moonGlow {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px #fff); }
            100% { transform: scale(1.05); filter: drop-shadow(0 0 20px #ffcc00); }
        }

        /* --- GAMEPLAY UI --- */
        h1 {
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            text-align: center;
            text-shadow: 0 0 15px #ff0077;
            margin: 0;
            padding: 0 15px;
            z-index: 10;
            line-height: 1.3;
        }

        #meter-container {
            width: 85%;
            max-width: 400px;
            height: 24px;
            background-color: #222;
            border: 3px solid #fff;
            border-radius: 20px;
            overflow: hidden;
            z-index: 10;
        }

        #meter {
            width: 30%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ffcc00, #00ffcc);
            transition: width 0.05s linear;
        }

        #vehicle {
            position: absolute;
            bottom: 8%;
            font-size: clamp(75px, 18vw, 100px);
            z-index: 5;
            transform: translate(-50%, 0);
            left: 50%;
        }

        .shake-light { animation: shake 0.3s infinite alternate; }
        .shake-medium { animation: shake 0.15s infinite alternate; }
        .shake-heavy { animation: shake 0.05s infinite alternate; }

        @keyframes shake {
            0% { transform: translate(calc(-50% + 2px), 2px) rotate(0deg); }
            100% { transform: translate(calc(-50% - 2px), -2px) rotate(1deg); }
        }

        .particle {
            position: absolute;
            font-size: clamp(30px, 8vw, 45px);
            pointer-events: none;
            z-index: 6;
            animation: explode 0.6s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0); opacity: 0; }
        }

        #reset-btn {
            display: none;
            position: absolute;
            top: 65%;
            padding: 15px 30px;
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Arial Black', sans-serif;
            z-index: 20;
            touch-action: manipulation;
        }
    </style>
</head>
<body>

    <div id="select-screen">
        <h2>WHO IS FLYING?</h2>
        <div class="btn-grid">
            <button class="player-btn" style="background: #05141a;" onclick="choosePlayer('carter')">CARTER 👽</button>
            <button class="player-btn" style="background: #1a051a;" onclick="choosePlayer('audrey')">AUDREY ✨</button>
            <button class="player-btn" style="background: #1a0f05;" onclick="choosePlayer('kamden')">KAMDEN 🦖</button>
            <button class="player-btn" style="background: #220511;" onclick="choosePlayer('kamila')">KAMILA 🧸</button>
        </div>
    </div>

    <div id="lochlyn-container">
        <div id="lochlyn-bubble">READY!</div>
        <div id="lochlyn-avatar">🧑‍🚀</div>
    </div>

    <div id="moon">🌕</div>

    <h1 id="status-text">CHOOSE A CHARACTER!</h1>

    <div id="meter-container">
        <div id="meter"></div>
    </div>

    <div id="vehicle">🚀</div>

    <button id="reset-btn" onclick="backToMenu(event)">SWITCH CHARACTER 🔄</button>

    <script>
        const configs = {
            carter: {
                name: "CARTER",
                icon: "🛸", 
                sparks: ['👾', '⚡', '💥', '🟢', '🎮'],
                bg: "linear-gradient(to top, #05141a, #000510)",
                accent: "#00eeff",
                drain: 0.8,      
                hasTimer: true,  
                soundType: 'square', 
                actionText: "TAP FAST! SPEED MODE"
            },
            audrey: {
                name: "AUDREY",
                icon: "🚀", 
                sparks: ['💎', '✨', '🔮', '⭐', '💜'],
                bg: "linear-gradient(to top, #1a051a, #0f0015)",
                accent: "#ff00cc",
                drain: 0.8,      
                hasTimer: true,  
                soundType: 'triangle', 
                actionText: "TAP FAST! SPEED MODE"
            },
            kamden: {
                name: "KAMDEN",
                icon: "🦖", 
                sparks: ['🔥', 'BONE', '🌲', '💥', '🌋'], 
                bg: "linear-gradient(to top, #1a0f05, #0d0500)",
                accent: "#ffaa00",
                drain: 0.3,      
                hasTimer: false,
                soundType: 'stomp', 
                actionText: "STOMP FAST TO CLIMB!"
            },
            kamila: {
                name: "KAMILA",
                icon: "🧸", 
                sparks: ['🎈', '🌸', '🍼', '🌈', '💖'], 
                bg: "linear-gradient(to top, #220511, #0f0005)",
                accent: "#ff66aa",
                drain: 0,        
                hasTimer: false,
                soundType: 'sine', 
                actionText: "TAP TO FLY!"
            }
        };

        // Standardizing dinosaur bone token for cross-platform emojis
        configs.kamden.sparks[1] = '🦴';

        let currentConfig = null;
        let power = 30;
        let isLaunched = false;
        let isDead = false;
        let gameStarted = false;
        let drainInterval = null;
        let audioCtx = null;
        let startTime = 0; 

        const vehicle = document.getElementById('vehicle');
        const meter = document.getElementById('meter');
        const statusText = document.getElementById('status-text');
        const resetBtn = document.getElementById('reset-btn');
        const selectScreen = document.getElementById('select-screen');
        const moon = document.getElementById('moon');
        
        const lochlynContainer = document.getElementById('lochlyn-container');
        const lochlynAvatar = document.getElementById('lochlyn-avatar');
        const lochlynBubble = document.getElementById('lochlyn-bubble');

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function choosePlayer(key) {
            initAudio();
            currentConfig = configs[key];
            
            document.body.style.background = currentConfig.bg;
            vehicle.innerText = currentConfig.icon;
            vehicle.style.bottom = "8%"; 
            statusText.innerText = currentConfig.actionText + ", " + currentConfig.name + "!";
            statusText.style.textShadow = `0 0 15px ${currentConfig.accent}`;
            
            lochlynBubble.innerText = "GO " + currentConfig.name + "!!";
            lochlynContainer.style.display = 'flex';
            
            selectScreen.style.display = 'none';
            moon.style.display = 'block';
        }

        function lochlynCheer() {
            lochlynAvatar.classList.remove('jump');
            void lochlynAvatar.offsetWidth; 
            lochlynAvatar.classList.add('jump');

            let cheers = ["GO GO GO! ⭐", "TO THE MOON! 🌕", "LOOK AT IT CLIMB! 🚀"];
            if (currentConfig.soundType === 'stomp') {
                cheers = ["STOMP IT! 🦖", "BIG STOMPS! 💥", "BOOM BOOM!! 🌋"];
            } else if (currentConfig.hasTimer) {
                cheers = ["GO FOR THE RECORD!! ⚡", "SO FAST!! ⏱️", "HIT ACCELERATION! 🔥"];
            }
            
            if (Math.random() < 0.35) {
                lochlynBubble.innerText = cheers[Math.floor(Math.random() * cheers.length)];
            }
        }

        function playAudioEffect(type, currentPower) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            if (type === 'stomp') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(85, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(15, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } else {
                osc.type = type; 
                const startFreq = 140 + (currentPower * 5); 
                osc.frequency.setValueAtTime(startFreq, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(startFreq * 1.2, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            }
        }

        function playBlastOffSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 1.5);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        function playExplosionSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(110, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(25, audioCtx.currentTime + 0.8);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.8);
        }

        function startFuelDrain() {
            drainInterval = setInterval(() => {
                if (isLaunched || isDead) return;
                power -= currentConfig.drain; 
                if (power <= 0) {
                    power = 0;
                    explodeVehicle();
                }
                meter.style.width = power + '%';
                updateGameVisuals();
            }, 50);
        }

        function updateGameVisuals() {
            vehicle.className = ''; 
            if (power >= 75) vehicle.classList.add('shake-heavy');
            else if (power >= 40) vehicle.classList.add('shake-medium');
            else if (power >= 10) vehicle.classList.add('shake-light');

            if (!isLaunched && !isDead) {
                // Scales perfectly inside dynamic viewport bounds
                vehicle.style.bottom = (8 + (power * 0.40)) + '%';
            }
        }

        // UPGRADED TO POINTERDOWN: Zero latency engine activation on phones
        window.addEventListener('pointerdown', (e) => {
            if (!currentConfig || isLaunched || isDead || e.target.tagName === 'BUTTON') return;

            if (!gameStarted) {
                gameStarted = true;
                startTime = Date.now(); 
                startFuelDrain();
            }

            power += 5;
            if (power > 100) power = 100;

            meter.style.width = power + '%';
            
            // Brightness Screen Pulse Juice
            document.body.style.filter = "brightness(1.4)";
            setTimeout(() => { document.body.style.filter = "none"; }, 40);

            playAudioEffect(currentConfig.soundType, power);
            updateGameVisuals();
            lochlynCheer();

            // Handle touch coordinates vs mouse pointers cleanly
            const clickX = e.clientX || (e.touches && e.touches[0].clientX);
            const clickY = e.clientY || (e.touches && e.touches[0].clientY);
            
            for (let i = 0; i < 3; i++) {
                spawnParticle(clickX, clickY, currentConfig.sparks);
            }

            if (power >= 100) launch();
        });

        function launch() {
            isLaunched = true;
            clearInterval(drainInterval);
            
            vehicle.className = '';
            vehicle.style.transition = "bottom 1.4s cubic-bezier(0.25, 1, 0.5, 1), transform 1.4s ease-out";
            vehicle.style.bottom = "55%";
            vehicle.style.transform = "translate(-50%, 0) scale(0.6)";
            
            playBlastOffSound();
            lochlynBubble.innerText = "WOAAAAAHHH!!! 🤩";

            setTimeout(() => {
                if (currentConfig.hasTimer) {
                    const elapsedSeconds = ((Date.now() - startTime) / 1000).toFixed(2);
                    statusText.innerHTML = `${currentConfig.name} DOCKED IN ${elapsedSeconds}s! ⏱️<br><span style="font-size:clamp(0.9rem, 3.5vw, 1.3rem)">UNCLE SHANE & LOCHLYN LOVE YOU TO THE MOON AND BACK! ❤️</span>`;
                } else {
                    statusText.innerHTML = `${currentConfig.name}, UNCLE SHANE & LOCHLYN LOVE YOU TO THE MOON AND BACK! ❤️🌟`;
                }
                statusText.style.textShadow = "0 0 25px #ffcc00";
                
                lochlynBubble.innerText = "YOU DID IT! 🎉";

                const moonRect = moon.getBoundingClientRect();
                const moonX = moonRect.left + (moonRect.width / 2);
                const moonY = moonRect.top + (moonRect.height / 2);

                for (let i = 0; i < 35; i++) {
                    setTimeout(() => {
                        spawnParticle(moonX, moonY, ['❤️', '✨', '⭐', '🌈', '🎉']);
                    }, i * 15);
                }

                resetBtn.style.backgroundColor = currentConfig.accent;
                resetBtn.style.boxShadow = `0 0 20px ${currentConfig.accent}`;
                resetBtn.innerText = "PLAY AGAIN? 🔄";
                resetBtn.style.display = 'block';
            }, 1400);
        }

        function explodeVehicle() {
            isDead = true;
            clearInterval(drainInterval);
            statusText.innerText = "💥 ENGINE OVERHEAT! CRASH! 💥";
            document.body.style.background = "#3a0000";
            
            lochlynBubble.innerText = "UH OH! 😭";
            vehicle.innerText = "💥";
            vehicle.style.transform = "translate(-50%, 0) scale(2.2)";
            playExplosionSound();

            const rect = vehicle.getBoundingClientRect();
            for (let i = 0; i < 20; i++) {
                spawnParticle(rect.left + (rect.width/2), rect.top + (rect.height/2), ['💨', '🔥', '💀']);
            }

            setTimeout(() => {
                resetBtn.style.backgroundColor = "#ff0055";
                resetBtn.style.boxShadow = "0 0 20px #ff0055";
                resetBtn.innerText = "REPAIR & RETRY 🔧";
                resetBtn.style.display = 'block';
            }, 1000);
        }

        function spawnParticle(x, y, emojiList) {
            if (!x || !y) return;
            const p = document.createElement('span');
            p.classList.add('particle');
            p.innerText = emojiList[Math.floor(Math.random() * emojiList.length)];
            p.style.left = x + 'px';
            p.style.top = y + 'px';

            const rx = (Math.random() - 0.5) * 350 + 'px';
            const ry = (Math.random() - 0.5) * 350 + 'px';
            p.style.setProperty('--x', rx);
            p.style.setProperty('--y', ry);

            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }

        function backToMenu(e) {
            e.stopPropagation(); 
            clearInterval(drainInterval);
            
            vehicle.style.transition = "none";
            vehicle.style.transform = "translate(-50%, 0) scale(1)";
            
            power = 30;
            isLaunched = false;
            isDead = false;
            gameStarted = false;
            currentConfig = null;
            
            meter.style.width = '30%';
            vehicle.className = '';
            resetBtn.style.display = 'none';
            moon.style.display = 'none';
            lochlynContainer.style.display = 'none';
            
            document.body.style.background = "#02000a";
            selectScreen.style.display = 'flex';
            statusText.innerText = "CHOOSE A CHARACTER!";
            statusText.style.textShadow = "0 0 15px #ff0077";
        }
    </script>

</body>
</html>
